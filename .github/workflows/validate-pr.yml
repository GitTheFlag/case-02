name: Final Task Validator

on:
  pull_request_target:
    branches: [main]

jobs:
  check-branches-merged:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check all feature branches are merged
        id: check
        run: |
          git fetch --all
          MISSING=""
          for branch in feat/login feat/payments feat/hotfix feat/experiment; do
            if ! git merge-base --is-ancestor "origin/$branch" HEAD; then
              MISSING="$MISSING $branch"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "❌ These branches are not yet merged:$MISSING"
            echo "valid=false" >> $GITHUB_OUTPUT
          else
            echo "✅ All 4 branches merged. Case closed."
            echo "valid=true" >> $GITHUB_OUTPUT
          fi

      - name: Close PR with success message
        if: steps.check.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const player = context.payload.pull_request.user.login
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Case closed, @${player}!**\n\nAll 4 feature branches are in your solution.\n\n> **What you learned:** Merging integrates the full history of one branch into another. When you merge four branches, the resulting commit has all four as ancestors — \`git merge-base --is-ancestor\` verifies this. This is how teams integrate their work.\n\n---\nCase 02 complete. Try [Case 03](https://github.com/GitTheFlag/case-03) next. 🚩`
            })
            await github.rest.pulls.update({
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            })

      - name: Fail if branches not merged
        if: steps.check.outputs.valid != 'true'
        run: exit 1
