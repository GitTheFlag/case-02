name: Flag Validator

on:
  issues:
    types: [opened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Validate flag
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.trim()
            const flags = {
              'GTF{l0g_1s_y0ur_fr13nd}': {
                msg: '🎉 Flag 1 found! You read the commit history.',
                why: '> **What you learned:** `git log --oneline` shows every commit ever saved on a branch — hash, author, message. Nothing in git history is easy to hide. Reading the log of an unfamiliar codebase is always the first step.'
              },
              'GTF{d3l3t3d_f1l3s_t4lk}': {
                msg: '🎉 Flag 2 found! You recovered a deleted file.',
                why: '> **What you learned:** Deleting a file in git only removes it from the working directory. It still exists in every previous commit. This is how API keys get leaked — someone commits them, panics, deletes the file, but the secret lives on in history.'
              },
              'GTF{t4gs_h4v3_m3ss4g3s}': {
                msg: '🎉 Flag 3 found! You read an annotated tag.',
                why: '> **What you learned:** Annotated tags are not just labels — they have their own message, author, and date, separate from the commit they point to. `git tag -l` lists them, `git show <tagname>` reads them. Most developers never look at tags.'
              },
              'GTF{f5ck_f1nds_4ll}': {
                msg: '🎉 Flag 4 found! You found a dangling blob.',
                why: '> **What you learned:** `git fsck --lost-found` scans git\'s internal object store for objects with no references — files written to git but never attached to a commit. This is how accidentally staged secrets and deleted branches can be recovered.'
              }
            }
            const entry = flags[title]
            if (entry) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ Correct!\n\n${entry.msg}\n\n${entry.why}\n\n---\nKeep going — find all 4 flags then complete the final task.`
              })
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['solved']
              })
              await github.rest.issues.update({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed'
              })
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `❌ Not quite. Keep exploring!\n\nRemember: flags look like \`GTF{...}\`\n\nHint: read every branch, every commit message, every tag.`
              })
            }
